<!DOCTYPE html>
<html lang="pt-br">
<head>
     
    <!--Link do Bootstrap-->
     <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cor de Texto com Bootsrap</title>
</head>
<body>

    <!-- Cores em Texto -->
    <p class="text-primary">azul</p>
    <p class="text-success">verde</p>
    <p class="text-danger">vermelho</p>
    <p class="text-warning">amarelo</p>
    <p class="text-dark">preto</p>

    <!-- Margem m-1 ate m-5-->
     <div class="m-3">Margem tamanho</div>
     <div class="m-3">margem tamanho em cima</div>
     <div class="mb-3">margem so embaixo</div>

     <!-- Padding-->
      <div class="p-4">padding tamanho </div>
      <div class="pt-4">padding tamanho somenete em cima</div>
</body>
</html>
