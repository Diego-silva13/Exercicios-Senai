<!doctype html>
<html lang="pt-br">
  <head>

    <!-- Link Bootstrap-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario Bootstrap</title>
    <style>
        .container {
           border: 1px solid rgba(128, 128, 128, 0.7); 
           padding: 40px; 
           box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.3);
        }
    </style>
  </head>
  <body>
    <div class="container mb-3 mt-5">

      <h2>Formulario de Cadastro</h2>
      <form>
        <div class="mb-3">
          <label class="form-label">Nome Completo</label>
          <input type="text" class="form-control" placeholder="digite seu nome" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-control" placeholder="exemplo@gmail.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input type="password" class="form-control" placeholder="digite sua senha" required  />
        </div>
        <div class="mb-3">
          <label class="form-label">Estado</label>
          <select class="form-select">
            <option>Selecione</option>
            <option>Acre</option>
            <option>Alagoas</option>
            <option>Amapá</option>
            <option>Amazonas</option>
            <option>Bahia</option>
            <option>Ceará</option>
            <option>Distrito Federal</option>
            <option>Espírito Santo</option>
            <option>Goiás</option>
            <option>Maranhão</option>
            <option>Mato Grosso</option>
            <option>Mato Grosso do Sul</option>
            <option>Minas Gerais</option>
            <option>Pará</option>
            <option>Paraíba</option>
            <option>Paraná</option>
            <option>Pernambuco</option>
            <option>Piauí</option>
            <option>Rio de Janeiro</option>
            <option>Rio Grande do Norte</option>
            <option>Rio Grande do Sul</option>
            <option>Rondônia</option>
            <option>Roraima</option>
            <option>Santa Catarina</option>
            <option>São Paulo</option>
            <option>Sergipe</option>
            <option>Tocantins</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Entrar</button>
        <button type="reset" class="btn btn-secondary">Limpar</button>
      </form>
    </div>

    <!-- Link Javascript-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
