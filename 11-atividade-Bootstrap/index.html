<!doctype html>
<html lang="pt-br">
  <head>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrossel no Bootstrap</title>

    <style>
      .custom {
        height: 400px;
      }

      .custom img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>

  <body>

    
    <div class="container mt-5 w-60">
      <div class="w-75 mx-auto">

        <div id="meuCarrosel" class="carousel slide custom" data-bs-ride="carousel">
          <div class="carousel-indicators">
            <button
              type="button"
              data-bs-target="#meuCarrosel"
              data-bs-slide-to="0"
              class="active"
            ></button>

            <button
              type="button"
              data-bs-target="#meuCarrosel"
              data-bs-slide-to="1"
            ></button>

            <button
              type="button"
              data-bs-target="#meuCarrosel"
              data-bs-slide-to="2"
            ></button>
          </div>

          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="img/img1.avif" class="d-block w-100" />
              <div class="carousel-caption d-md-block">
                <h2>primeiro slide</h2>
                <p>Arthur Morgan e Jhon Marston</p>
              </div>
            </div>

            <div class="carousel-item">
              <img src="img/img2.webp" class="d-block w-100" />
              <div class="carousel-caption d-md-block">
                <h2>segundo slide</h2>
                <p>Negan the walking dead</p>
              </div>
            </div>

            <div class="carousel-item">
              <img src="img/img3.jpg" class="d-block w-100" />
              <div class="carousel-caption d-md-block">
                <h2>terceira imagem</h2>
                <p>Darth Vader star wars</p>
              </div>
            </div>
          </div>

          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#meuCarrosel"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon"></span>
          </button>

          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#meuCarrosel"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>

      </div>
    </div>

    <!-- Link Javascript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
